[Training-Settings]

[Training-Settings.identity]

version                                               = 'v7'
special_name                                          = '' 

[Training-Settings.learning-objective]

species                                               = 'NO2'

# Only one of these can be true. Default is bias.
bias                                                  = false   # learning objectives: bias = ground-based species observation - geophysical species concentration estimation
normalize_bias                                        = false
normalize_species                                     = false
absolute_species                                      = true 
log_species                                           = false

##########################################################
[Training-Settings.tree_structure_settings]
#############
LightGBM.Settings                               = true
LightGBM.objective                              = "regression"     # L2 Minimizes mean squared error (MSE), l1 Minimizes absolute error (MAE), huber l2+l1
LightGBM.metric                                 = ["rmse", "mae", "r2"] #Evaluation metric shown during training (doesn't affect optimization, just monitoring)

# Core algorithm choices
LightGBM.boosting_type                          = "goss"           # dart; rf; gbdt
LightGBM.data_sample_strategy                   = "goss"           # keep consistent when using goss
LightGBM.num_leaves                             = 511             # 2^n - 1; leaves control complexity 
LightGBM.num_boost_round                        = 10000             # total iterations (trees); early stopping will cut this
LightGBM.learning_rate                          = 0.001           # Model capacity = learning_rate × num_boost_round
LightGBM.early_stopping_rounds                  = 200
LightGBM.max_bin                                = 511               # histogram bins (CPU typical)

# Sampling & bundling
LightGBM.feature_fraction                       = 1.0              # % of features for each tree
LightGBM.bagging_fraction                       = 1.0              # Use 100% random sample each iteration-disable row bagging for GOSS
LightGBM.bagging_freq                           = 0                # No bagging

# rules: top_rate + other_rate should be 0.2-0.5
LightGBM.top_rate                               = 0.2              # GOSS: keep top 20% largest gradients
LightGBM.other_rate                             = 0.1              # GOSS: sample 10% of small-grad points
LightGBM.enable_bundle                          = true             # EFB (on by default)

# Regularization / tree constraints (the Ω(f_t) part)
LightGBM.min_data_in_leaf                       = 100               # Ω
LightGBM.lambda_l1                              = 0.0              # control sparsity, 0 - No L1 regularization
LightGBM.lambda_l2                              = 1.0              # 0 - no reg
LightGBM.min_gain_to_split                      = 0.0              # control meaningful splits, 0 accept every patterns
LightGBM.max_depth                              = -1               # With max_depth=-1, num_leaves controls everything.

# Reproducibility & runtime
LightGBM.deterministic                          = true             # Ensures same results on repeated runs
LightGBM.num_threads                            = 0                # 0 = use all cores
LightGBM.verbose                                = 0                # -1; 0; 1; 2

# Device
LightGBM.device                                 = "cpu"           # cuda or cpu
# If using GPU, consider: LightGBM.max_bin = 63   # common on GPU; see docs

#############
# XGBoost Configuration (alternative to LightGBM)
# NOTE: XGBoost uses depth-wise growth vs LightGBM's leaf-wise, needs different tuning
XGBoost.Settings                                = false            # Set to true to use XGBoost instead of LightGBM
XGBoost.objective                               = "reg:squarederror"  # reg:squarederror (MSE), reg:absoluteerror (MAE), reg:squaredlogerror, etc.
XGBoost.eval_metric                             = "rmse"           # Evaluation metric: rmse, mae, logloss, etc.

# Core algorithm choices
XGBoost.booster                                 = "dart"         # gbtree (tree-based), gblinear (linear), dart
XGBoost.sample_type                             = "weighted"
XGBoost.normalize_type                          = "tree"
XGBoost.rate_drop                               = 0.1
XGBoost.skip_drop                               = 0.5

XGBoost.tree_method                             = "hist"           # hist (histogram-based, fast), exact, approx, gpu_hist
XGBoost.max_leaves                              = 511               # Maximum leaves in tree (0 = no limit)
XGBoost.num_boost_round                         = 10000            # Total iterations (trees); early stopping will cut this
XGBoost.learning_rate                           = 0.001              # eta: step size shrinkage (0.01-0.3 typical)
XGBoost.early_stopping_rounds                   = 200              # Stop if no improvement for N rounds
XGBoost.max_bin                                 = 256              # REDUCED from 511 - less histogram detail reduces overfitting

# Sampling - ADD STOCHASTICITY TO REDUCE OVERFITTING
XGBoost.colsample_bytree                        = 1.0              # REDUCED from 1.0 - use 80% of features per tree
XGBoost.subsample                               = 1.0              # REDUCED from 1.0 - use 80% of samples per tree

# Regularization / tree constraints - STRENGTHEN TO REDUCE OVERFITTING
XGBoost.reg_alpha                               = 0.0              # INCREASED from 0.0 - L1 regularization for sparsity
XGBoost.reg_lambda                              = 1.0              # INCREASED from 1.0 - L2 regularization to prevent overfitting
XGBoost.min_child_weight                        = 1.0              # INCREASED from 1.0 - require more samples per leaf
XGBoost.gamma                                   = 0.0              # INCREASED from 0.0 - minimum loss reduction for split
XGBoost.max_depth                               = 0                # CONSTRAINED from 0 - limit tree depth (6 is typical)

# Runtime
XGBoost.n_jobs                                  = -1               # Number of parallel threads (-1 = use all cores)
XGBoost.verbosity                               = 1                # 0 (silent), 1 (warning), 2 (info), 3 (debug)

# Device
XGBoost.device                                  = "cpu"            # cpu or cuda (for GPU acceleration)
# For GPU: set tree_method = "gpu_hist" and device = "cuda"

