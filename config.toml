# Ensemble Settings - Combine multiple models for better performance
[Training-Settings.ensemble_settings]

# Ensemble Configuration
Ensemble.Settings                               = false            # Enable ensemble modeling
Ensemble.base_models                            = ['lightgbm', 'cnn']  # Models to ensemble (options: 'lightgbm', 'cnn', 'unet', 'resnet', etc.)
Ensemble.strategy                               = 'optimized'      # Options: 'simple', 'weighted', 'optimized', 'stacking'
                                                                   # - simple: Equal weights (50-50 average)
                                                                   # - weighted: R²-based weights (better models get more weight)
                                                                   # - optimized: Find optimal weights via scipy
                                                                   # - stacking: Use Ridge regression meta-model
Ensemble.custom_weights                         = []               # Optional: Provide custom weights [0.6, 0.4] (must sum to 1)
                                                                   # Leave empty [] to use automatic weighting based on strategy

# Ensemble Evaluation Settings
Ensemble.evaluate_individual_models             = true             # Show performance of each base model
Ensemble.save_ensemble_predictions              = true             # Save ensemble predictions to file

